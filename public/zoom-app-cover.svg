<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="zoomBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D8CFF"/>
      <stop offset="100%" style="stop-color:#0b5cff"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#162032"/>
    </linearGradient>
    <linearGradient id="glowCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowBlue" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D8CFF;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2D8CFF;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Decorative glow circles -->
  <circle cx="150" cy="300" r="300" fill="url(#glowCyan)"/>
  <circle cx="1050" cy="300" r="250" fill="url(#glowBlue)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>

  <!-- Left section: Branding + Text -->

  <!-- GenAI People Logo -->
  <rect x="80" y="140" width="56" height="56" rx="12" fill="url(#cyan)"/>
  <text x="108" y="178" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="36" fill="#ffffff">G</text>

  <text x="150" y="172" font-family="Arial, sans-serif" font-weight="700" font-size="24" fill="#ffffff">GenAI People</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial, sans-serif" font-weight="700" font-size="42" fill="#ffffff">Webinar Registration</text>
  <text x="80" y="315" font-family="Arial, sans-serif" font-weight="700" font-size="42" fill="url(#cyan)">Auto-Sync to Zoom</text>

  <!-- Description -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="#94a3b8">Automatically register webinar attendees from our</text>
  <text x="80" y="396" font-family="Arial, sans-serif" font-weight="400" font-size="18" fill="#94a3b8">landing page to Zoom meetings via n8n automation.</text>

  <!-- Feature pills -->
  <rect x="80" y="430" width="160" height="36" rx="18" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <text x="160" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#06b6d4">OAuth 2.0 S2S</text>

  <rect x="255" y="430" width="200" height="36" rx="18" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <text x="355" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#06b6d4">meeting:write:admin</text>

  <rect x="470" y="430" width="150" height="36" rx="18" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <text x="545" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#06b6d4">n8n Webhook</text>

  <!-- URL -->
  <text x="80" y="510" font-family="Arial, sans-serif" font-weight="400" font-size="14" fill="#64748b">genaipeople.com</text>

  <!-- Right section: Flow diagram mini -->

  <!-- Card 1: Form -->
  <rect x="740" y="130" width="180" height="90" rx="12" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>
  <rect x="740" y="130" width="180" height="3" rx="1.5" fill="url(#cyan)"/>
  <rect x="764" y="155" width="24" height="24" rx="6" fill="#06b6d4" opacity="0.2"/>
  <text x="776" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#06b6d4">W</text>
  <text x="800" y="170" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#ffffff">Web Form</text>
  <text x="764" y="198" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Name, Email, Phone</text>

  <!-- Arrow down -->
  <line x1="830" y1="220" x2="830" y2="255" stroke="#475569" stroke-width="1.5"/>
  <polygon points="825,252 830,262 835,252" fill="#475569"/>

  <!-- Card 2: n8n -->
  <rect x="740" y="265" width="180" height="90" rx="12" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>
  <rect x="740" y="265" width="180" height="3" rx="1.5" fill="#ea4335"/>
  <rect x="764" y="290" width="24" height="24" rx="6" fill="#ea4335" opacity="0.2"/>
  <text x="776" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="10" fill="#ea4335">n8n</text>
  <text x="800" y="305" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#ffffff">n8n Automation</text>
  <text x="764" y="333" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Webhook + Orchestration</text>

  <!-- Arrow down splits -->
  <line x1="830" y1="355" x2="830" y2="385" stroke="#475569" stroke-width="1.5"/>

  <!-- Split left -->
  <line x1="830" y1="385" x2="770" y2="385" stroke="#475569" stroke-width="1.5"/>
  <line x1="770" y1="385" x2="770" y2="400" stroke="#475569" stroke-width="1.5"/>
  <polygon points="765,397 770,407 775,397" fill="#475569"/>

  <!-- Split right -->
  <line x1="830" y1="385" x2="900" y2="385" stroke="#475569" stroke-width="1.5"/>
  <line x1="900" y1="385" x2="900" y2="400" stroke="#475569" stroke-width="1.5"/>
  <polygon points="895,397 900,407 905,397" fill="#475569"/>

  <!-- Card 3a: Zoom -->
  <rect x="680" y="410" width="180" height="80" rx="12" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>
  <rect x="680" y="410" width="180" height="3" rx="1.5" fill="url(#zoomBlue)"/>
  <rect x="704" y="432" width="24" height="24" rx="6" fill="#2D8CFF" opacity="0.2"/>
  <text x="716" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#2D8CFF">ZM</text>
  <text x="740" y="448" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#ffffff">Zoom API</text>
  <text x="704" y="472" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Add Registrant</text>

  <!-- Card 3b: Email -->
  <rect x="870" y="410" width="180" height="80" rx="12" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>
  <rect x="870" y="410" width="180" height="3" rx="1.5" fill="#ea4335"/>
  <rect x="894" y="432" width="24" height="24" rx="6" fill="#ea4335" opacity="0.2"/>
  <text x="906" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#ea4335">@</text>
  <text x="930" y="448" font-family="Arial, sans-serif" font-weight="600" font-size="13" fill="#ffffff">Gmail</text>
  <text x="894" y="472" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Confirmation + Reminders</text>

  <!-- Accent line bottom -->
  <rect x="0" y="585" width="1200" height="15" fill="url(#cyan)" opacity="0.15"/>
  <rect x="0" y="595" width="1200" height="5" fill="url(#cyan)"/>
</svg>
