<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="headerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="zoomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D8CFF"/>
      <stop offset="100%" style="stop-color:#1a6fdf"/>
    </linearGradient>
    <linearGradient id="n8nGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6d5a"/>
      <stop offset="100%" style="stop-color:#ea4335"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="gmailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA4335"/>
      <stop offset="100%" style="stop-color:#c5221f"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#f8fafc" rx="0"/>

  <!-- Header -->
  <rect width="1200" height="70" fill="url(#headerBg)" rx="0"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="#ffffff">GenAI People - Webinar Registration Technical Design</text>
  <text x="1160" y="44" font-family="Arial, sans-serif" font-weight="400" font-size="14" fill="#94a3b8" text-anchor="end">Zoom OAuth Integration via n8n</text>

  <!-- Section: Data Flow -->
  <text x="40" y="110" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="#64748b" letter-spacing="1.5">REGISTRATION FLOW</text>

  <!-- Step 1: User / Website -->
  <rect x="40" y="140" width="200" height="120" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="140" width="200" height="4" rx="2" fill="url(#webGrad)"/>
  <circle cx="90" cy="186" r="22" fill="#ecfeff"/>
  <text x="90" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#06b6d4">U</text>
  <text x="130" y="182" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#0f172a">User</text>
  <text x="130" y="198" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Fills registration</text>
  <text x="130" y="212" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">form on website</text>
  <text x="140" y="244" font-family="Arial, sans-serif" font-weight="500" font-size="10" fill="#06b6d4">genaipeople.com/webinar</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="200" x2="320" y2="200" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="320,195 330,200 320,205" fill="#06b6d4"/>
  <text x="280" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#06b6d4">POST</text>

  <!-- Step 2: n8n Webhook -->
  <rect x="330" y="140" width="220" height="120" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="330" y="140" width="220" height="4" rx="2" fill="url(#n8nGrad)"/>
  <circle cx="380" cy="186" r="22" fill="#fff5f5"/>
  <text x="380" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="14" fill="#ea4335">n8n</text>
  <text x="420" y="182" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#0f172a">n8n Webhook</text>
  <text x="420" y="198" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Receives: name, email,</text>
  <text x="420" y="212" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">phone from form POST</text>
  <text x="440" y="244" font-family="Arial, sans-serif" font-weight="500" font-size="10" fill="#ea4335">/webhook/webinar-register</text>

  <!-- Arrow 2a: to Zoom -->
  <line x1="550" y1="180" x2="640" y2="180" stroke="#2D8CFF" stroke-width="2"/>
  <polygon points="640,175 650,180 640,185" fill="#2D8CFF"/>
  <text x="595" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#2D8CFF">API</text>

  <!-- Arrow 2b: to Gmail Confirmation -->
  <line x1="550" y1="220" x2="640" y2="320" stroke="#EA4335" stroke-width="2"/>
  <polygon points="636,316 650,320 640,326" fill="#EA4335"/>

  <!-- Step 3: Zoom API -->
  <rect x="650" y="140" width="220" height="120" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="140" width="220" height="4" rx="2" fill="url(#zoomGrad)"/>
  <circle cx="700" cy="186" r="22" fill="#eff6ff"/>
  <text x="700" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800" font-size="12" fill="#2D8CFF">ZOOM</text>
  <text x="740" y="182" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#0f172a">Zoom Meeting API</text>
  <text x="740" y="198" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Add registrant via</text>
  <text x="740" y="212" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Server-to-Server OAuth</text>
  <text x="760" y="244" font-family="Arial, sans-serif" font-weight="500" font-size="10" fill="#2D8CFF">POST /meetings/{id}/registrants</text>

  <!-- Arrow 3: Zoom confirms -->
  <line x1="870" y1="200" x2="950" y2="200" stroke="#2D8CFF" stroke-width="2"/>
  <polygon points="950,195 960,200 950,205" fill="#2D8CFF"/>

  <!-- Step 4: Registrant Added -->
  <rect x="960" y="155" width="200" height="90" rx="12" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1060" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#16a34a">Registered</text>
  <text x="1060" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#4ade80">User added to Zoom</text>
  <text x="1060" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#4ade80">meeting as registrant</text>

  <!-- Email Section Label -->
  <text x="40" y="310" font-family="Arial, sans-serif" font-weight="600" font-size="14" fill="#64748b" letter-spacing="1.5">EMAIL SEQUENCE (via Gmail API)</text>

  <!-- Email 1: Confirmation -->
  <rect x="650" y="300" width="240" height="100" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="300" width="240" height="4" rx="2" fill="url(#gmailGrad)"/>
  <circle cx="690" cy="346" r="18" fill="#fef2f2"/>
  <text x="690" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#ea4335">@</text>
  <text x="720" y="340" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#0f172a">Instant Confirmation</text>
  <text x="720" y="356" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Zoom link + event details</text>
  <text x="720" y="372" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Sent immediately on register</text>
  <text x="770" y="390" font-family="Arial, sans-serif" font-weight="500" font-size="10" fill="#ea4335">from: prapti@genaipeople.com</text>

  <!-- Email 2: 1 Day Before -->
  <rect x="650" y="420" width="240" height="100" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="420" width="240" height="4" rx="2" fill="#f59e0b"/>
  <circle cx="690" cy="466" r="18" fill="#fffbeb"/>
  <text x="690" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f59e0b">1d</text>
  <text x="720" y="460" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#0f172a">1 Day Before</text>
  <text x="720" y="476" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Reminder with Zoom link</text>
  <text x="720" y="492" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">"Tomorrow's the Day!"</text>
  <text x="770" y="510" font-family="Arial, sans-serif" font-weight="500" font-size="10" fill="#f59e0b">Scheduled: March 20, 10:00 AM IST</text>

  <!-- Email 3: 1 Hour Before -->
  <rect x="650" y="540" width="240" height="100" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="650" y="540" width="240" height="4" rx="2" fill="#dc2626"/>
  <circle cx="690" cy="586" r="18" fill="#fef2f2"/>
  <text x="690" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#dc2626">1h</text>
  <text x="720" y="580" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#0f172a">1 Hour Before</text>
  <text x="720" y="596" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Final reminder with join link</text>
  <text x="720" y="612" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">"We're Live in 1 Hour!"</text>
  <text x="770" y="630" font-family="Arial, sans-serif" font-weight="500" font-size="10" fill="#dc2626">Scheduled: March 21, 10:00 AM IST</text>

  <!-- Wait nodes -->
  <rect x="480" y="440" width="130" height="50" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="545" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#c2410c">Wait until</text>
  <text x="545" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="10" fill="#ea580c">March 20, 10 AM</text>

  <rect x="480" y="560" width="130" height="50" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="545" y="582" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" fill="#c2410c">Wait until</text>
  <text x="545" y="598" text-anchor="middle" font-family="Arial, sans-serif" font-weight="500" font-size="10" fill="#ea580c">March 21, 10 AM</text>

  <!-- Arrows to wait nodes -->
  <line x1="440" y1="260" x2="440" y2="465" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="440" y1="465" x2="480" y2="465" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="480,461 486,465 480,469" fill="#94a3b8"/>

  <line x1="420" y1="260" x2="420" y2="585" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="420" y1="585" x2="480" y2="585" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="480,581 486,585 480,589" fill="#94a3b8"/>

  <!-- Arrows from wait to email -->
  <line x1="610" y1="465" x2="650" y2="470" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="646,466 656,470 646,474" fill="#f59e0b"/>

  <line x1="610" y1="585" x2="650" y2="590" stroke="#dc2626" stroke-width="2"/>
  <polygon points="646,586 656,590 646,594" fill="#dc2626"/>

  <!-- Data Box -->
  <rect x="40" y="340" width="260" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="340" width="260" height="4" rx="2" fill="#6366f1"/>
  <text x="60" y="372" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#0f172a">Data Collected</text>
  <text x="60" y="398" font-family="Courier New, monospace" font-size="12" fill="#6366f1">{ </text>
  <text x="72" y="416" font-family="Courier New, monospace" font-size="11" fill="#374151">"name": "John Doe",</text>
  <text x="72" y="434" font-family="Courier New, monospace" font-size="11" fill="#374151">"email": "john@example.com",</text>
  <text x="72" y="452" font-family="Courier New, monospace" font-size="11" fill="#374151">"phone": "+91 98765 43210"</text>
  <text x="60" y="470" font-family="Courier New, monospace" font-size="12" fill="#6366f1">}</text>
  <text x="60" y="498" font-family="Arial, sans-serif" font-weight="400" font-size="10" fill="#94a3b8">Content-Type: application/json</text>
  <text x="60" y="512" font-family="Arial, sans-serif" font-weight="400" font-size="10" fill="#94a3b8">Method: POST</text>

  <!-- Auth Box -->
  <rect x="40" y="540" width="260" height="110" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="540" width="260" height="4" rx="2" fill="#16a34a"/>
  <text x="60" y="572" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#0f172a">Auth and Security</text>
  <text x="60" y="596" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Zoom: Server-to-Server OAuth 2.0</text>
  <text x="60" y="614" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">Gmail: OAuth 2.0 (prapti@genaipeople.com)</text>
  <text x="60" y="632" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b">n8n: Self-hosted, HTTPS webhook endpoint</text>

  <!-- Footer -->
  <rect x="0" y="670" width="1200" height="30" fill="#f1f5f9"/>
  <text x="40" y="690" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#94a3b8">GenAI People - genaipeople.com - Webinar: Claude Code Sprint, March 21st, 2025, Saturday 11:00 AM IST</text>
  <text x="1160" y="690" text-anchor="end" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#94a3b8">Scopes: meeting:write:admin</text>
</svg>
